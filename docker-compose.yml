services:
  hawkstars:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
      - HOSTNAME=0.0.0.0
      # Add your environment variables here
      # - DATABASE_URL=your_database_url
      # - NEXTAUTH_SECRET=your_secret
      # - NEXTAUTH_URL=http://localhost:8000
    # volumes:
    #   - ./uploads:/app/uploads  # If you need persistent storage
    restart: unless-stopped
