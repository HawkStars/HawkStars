name: Auto Deploy in VPS after Push in Production

on:
  push:
    branches:
      - main
jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # docs https://pnpm.io/continuous-integration#github-actions
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint code
        run: pnpm lint

      - name: Check types
        run: pnpm tsc
  deploy:
    name: Deploy project with Nginx
    permissions:
      deployments: write
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}

      - name: Create GitHub deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: '${{ github.token }}'
          environment: production

      - name: Set up SSH Key and Deploy my App on Server
        # run: |
        uses: appleboy/ssh-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_EMAIL_USER: ${{ secrets.GOOGLE_EMAIL_USER }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 22
          envs: NEXT_PUBLIC_APP_URL,PAYLOAD_SECRET,SENTRY_AUTH_TOKEN,CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REFRESH_TOKEN,GOOGLE_EMAIL_USER
          script: |
            git config --global url."https://${{ secrets.PERSONAL_GITHUB_TOKEN }}:@github.com".insteadOf "https://github.com"
            cd app/
            git pull

            # Install pnpm if not already installed
            if ! command -v pnpm &> /dev/null; then
                echo "Installing pnpm..."
                curl -fsSL https://get.pnpm.io/install.sh | sh -
                source ~/.bashrc 2>/dev/null || true
                source ~/.zshrc 2>/dev/null || true
                export PATH="$HOME/.local/share/pnpm:$PATH"
            fi

            # Verify pnpm is available
            pnpm --version

            # Create .env file dynamically
            cat > .env << EOF
            NODE_ENV=production
            NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
            PAYLOAD_SECRET=${PAYLOAD_SECRET}
            DATABASE_URI=mongodb://localhost:27017/hawkstars
            SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}
            CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
            CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
            CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
            GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
            GOOGLE_EMAIL_USER=${GOOGLE_EMAIL_USER}
            EOF

            # Restrict permissions so only owner can read
            chmod 600 .env

            # # Stop existing PM2 process if running
            pm2 stop hawkstars 2>/dev/null || true
            pm2 delete hawkstars 2>/dev/null || true

            # Delete current .next folder to ensure a clean build
            rm -rf .next

            # Install dependencies and build
            pnpm install --frozen-lockfile
            pnpm build

            # Start the application with PM2
            pm2 start npm --name "hawkstars" -- start

      - name: Update deployment Status (success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          state: 'success'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}

      - name: Update deployment status (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          state: 'failure'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
  storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # docs https://pnpm.io/continuous-integration#github-actions
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile
        #👇 Adds Chromatic as a step in the workflow

      - uses: chromaui/action@latest
        # Options required for Chromatic's GitHub Action
        with:
          #👇 Chromatic projectToken, see https://storybook.js.org/tutorials/intro-to-storybook/react/en/deploy/ to obtain it
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}
