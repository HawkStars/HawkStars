name: Auto Deploy in VPS after Push in Production

on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy project with Nginx
    permissions:
      deployments: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
      - name: Create GitHub deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: '${{ github.token }}'
          environment: production
      - name: Set up SSH Key and Deploy my App on Server
        # run: |
        uses: appleboy/ssh-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 22
          envs: NEXT_PUBLIC_APP_URL,PAYLOAD_SECRET,SENTRY_AUTH_TOKEN,CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET
          script: |
            git config --global url."https://${{ secrets.PERSONAL_GITHUB_TOKEN }}:@github.com".insteadOf "https://github.com"
            cd app/
            git pull

            # Install pnpm if not already installed
            if ! command -v pnpm &> /dev/null; then
                echo "Installing pnpm..."
                curl -fsSL https://get.pnpm.io/install.sh | sh -
                source ~/.bashrc 2>/dev/null || true
                source ~/.zshrc 2>/dev/null || true
                export PATH="$HOME/.local/share/pnpm:$PATH"
            fi

            # Verify pnpm is available
            pnpm --version

            # Create .env file dynamically (only for docker-compose, not committed)
            cat > .env << EOF
            NODE_ENV=production
            NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
            PAYLOAD_SECRET=${PAYLOAD_SECRET}
            DATABASE_URI=mongodb://localhost:27017/hawkstars
            SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}
            CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
            CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
            CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
            EOF

            # Restrict permissions so only owner can read
            chmod 600 .env


            # # Stop existing PM2 process if running
            # pm2 stop hawkstars 2>/dev/null || true
            # pm2 delete hawkstars 2>/dev/null || true

            # Install dependencies and build
            pnpm install --frozen-lockfile
            pnpm build

            # Start the application with PM2
            # pm2 start pnpm --name "hawkstars" -- start

            pnpm start

            # Clean up .env after deployment (optional but recommended)
            rm .env
      - name: Update deployment Status (success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          state: 'success'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}

      - name: Update deployment status (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          state: 'failure'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
